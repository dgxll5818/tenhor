name: Daily Cache Warmup
on:
schedule:
**- cron: '0 0 * * '  # 每天运行一次*
workflow_dispatch:     # 允许手动点击运行
jobs:
warmup:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4
- name: Set up Python
uses: actions/setup-python@v4
with:
python-version: '3.9'
- name: Install Requests
run: pip install requests
- name: Run Script
run: python warmup.py
